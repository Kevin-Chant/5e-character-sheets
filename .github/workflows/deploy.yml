name: Deploy

# Runs only after the CI workflow succeeds on main (or via the manual
# "Run workflow" button). Keeping deploy in its own workflow — gated on CI
# rather than a job in ci.yml — means a red build never ships.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # workflow_dispatch has no workflow_run context, so allow it through;
    # otherwise require the triggering CI run to have succeeded.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          # Build the exact commit CI validated, not just the branch tip.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Sync to S3
        run: aws s3 sync dist/ s3://dndcharactersheets.net/ --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E1OOZYBJOLLZ3S --paths "/*"
